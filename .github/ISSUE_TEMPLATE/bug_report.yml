name: Bug Report
description: Report a bug or crash
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? Describe the bug in detail.
      placeholder: "Example: The app crashes when I switch between projects with Ctrl+`"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Create a new project
        2. Open multiple terminals
        3. Press Cmd+H to navigate left
        4. App crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: "The app should navigate to the terminal on the left without crashing"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant details:
        - Cells version (check About in Settings)
        - macOS version
        - Terminal/shell you're using
      placeholder: |
        - Cells: v0.1.42
        - macOS: 14.2.1
        - Shell: zsh
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console output / error logs
      description: If there are any errors in the console, paste them here
      render: shell
      placeholder: "Paste any error messages or console output"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context that might help us debug this
      placeholder: "Optional additional information"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched for existing issues
          required: true
        - label: This happens consistently and isn't random
          required: false
