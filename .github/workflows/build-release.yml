name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.17)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0 # Full history for changelog generation

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "Using Apple ID notarization credentials"
            xcrun notarytool store-credentials "cells-ci-notary" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD"
            unset APPLE_API_KEY APPLE_API_KEY_CONTENT APPLE_API_KEY_ID APPLE_API_ISSUER
          else
            APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_CONTENT" > "$APPLE_API_KEY_PATH"
            chmod 600 "$APPLE_API_KEY_PATH"
            echo "APPLE_API_KEY_PATH bytes: $(wc -c < "$APPLE_API_KEY_PATH")"
            echo "APPLE_API_KEY_PATH first line: $(head -n 1 "$APPLE_API_KEY_PATH")"
            echo "APPLE_API_KEY_PATH last line: $(tail -n 1 "$APPLE_API_KEY_PATH")"
            openssl pkey -in "$APPLE_API_KEY_PATH" -noout >/dev/null
            xcrun notarytool store-credentials "cells-ci-notary" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER"
            export APPLE_API_KEY="$APPLE_API_KEY_PATH"
          fi
          pnpm release

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          PREV_TAG=$(
            git tag --merged HEAD --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -Fxv "$RELEASE_TAG" \
              | head -n 1 \
              || true
          )

          # Changelog — feature/fix commits only (skip release/merge commits)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD \
              | grep -v '^- release:' \
              | grep -v '^- Merge' \
              || echo "- Maintenance and bug fixes")
          else
            CHANGELOG=$(git log --pretty=format:"- %s" \
              | grep -v '^- release:' \
              | grep -v '^- Merge' \
              || echo "- Initial release")
          fi

          printf '%s\n' "$CHANGELOG" > changelog.md
          export PREV_TAG

          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { readFileSync, writeFileSync } = require("node:fs");

          const prevTag = process.env.PREV_TAG?.trim();
          const repo = process.env.GITHUB_REPOSITORY;
          const refName = process.env.RELEASE_TAG;
          const sha = process.env.GITHUB_SHA;
          const changelog = readFileSync("changelog.md", "utf8").trim() || "- Maintenance and bug fixes";
          const fullChangelogUrl = prevTag
            ? `https://github.com/${repo}/compare/${prevTag}...${refName}`
            : `https://github.com/${repo}/commits/${sha}`;

          const endpoint = prevTag
            ? `repos/${repo}/compare/${prevTag}...${refName}`
            : `repos/${repo}/commits?sha=${sha}&per_page=100`;

          const response = JSON.parse(
            execFileSync("gh", ["api", endpoint], { encoding: "utf8" }),
          );
          const commits = Array.isArray(response) ? response : response.commits ?? [];

          const contributors = [];
          const seen = new Set();

          for (const commit of commits) {
            const login = commit.author?.login?.trim();
            const name = commit.commit?.author?.name?.trim();
            const key = login
              ? `login:${login.toLowerCase()}`
              : name
                ? `name:${name}`
                : null;

            if (!key || seen.has(key)) {
              continue;
            }

            seen.add(key);

            if (login) {
              const label =
                name && name.toLowerCase() !== login.toLowerCase()
                  ? `${name} (@${login})`
                  : `@${login}`;
              contributors.push(`- [${label}](https://github.com/${login})`);
              continue;
            }

            if (name) {
              contributors.push(`- ${name}`);
            }
          }

          const contributorSection = contributors.length
            ? contributors.join("\n")
            : "- No external contributors recorded";

          const body = [
            "## What's Changed",
            "",
            changelog,
            "",
            "## Contributors",
            "",
            contributorSection,
            "",
            `**Full Changelog**: ${fullChangelogUrl}`,
          ].join("\n") + "\n";
          writeFileSync("release-notes.md", body);
          NODE

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest \
            --title "${RELEASE_TAG#v}" \
            --notes-file release-notes.md
