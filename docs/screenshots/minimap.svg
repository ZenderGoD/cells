<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2228"/>
      <stop offset="100%" stop-color="#181b20"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22262d"/>
      <stop offset="100%" stop-color="#1c2026"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Terminal content area (dimmed) -->
  <g opacity="0.6">
    <text x="40" y="36" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13" fill="#7a8599">*  Crunched for 6m 11s</text>
    <line x1="30" y1="50" x2="770" y2="50" stroke="#333a45" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="40" y="72" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" fill="#8a93a5">&#x276F;</text>
    <rect x="56" y="60" width="9" height="16" rx="1" fill="#c8cdd6" opacity="0.8"/>
    <line x1="30" y1="86" x2="770" y2="86" stroke="#333a45" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="52" y="108" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="12" fill="#e06070">&#x25B8;&#x25B8; bypass permissions on</text>
    <text x="272" y="108" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="12" fill="#555d6d">(shift+tab to cycle)</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="130" width="800" height="70" fill="url(#barBg)"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="#2a2f38" stroke-width="1"/>

  <!-- Cells logo (hexagon) -->
  <g transform="translate(40,158)">
    <polygon points="0,-11 9.5,-5.5 9.5,5.5 0,11 -9.5,5.5 -9.5,-5.5" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="0,-4.5 3.9,-2.25 3.9,2.25 0,4.5 -3.9,2.25 -3.9,-2.25" fill="none" stroke="#6b7280" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- Default tab -->
  <text x="72" y="163" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="13" fill="#555d6d">Default</text>

  <!-- imai tab -->
  <text x="145" y="163" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="13" fill="#555d6d">imai</text>

  <!-- cells tab (active) -->
  <rect x="200" y="146" width="76" height="26" rx="6" fill="#ffffff" fill-opacity="0.06"/>
  <text x="212" y="164" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#e0e4ea">cells</text>
  <text x="252" y="164" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="12" fill="#555d6d">5</text>

  <!-- Minimap node tiles -->
  <g transform="translate(290,140)">
    <!-- Tile 1: Terminal (active/current) - bright border -->
    <g transform="translate(0,0)">
      <rect width="28" height="28" rx="5" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1"/>
      <!-- TerminalSquare icon -->
      <g transform="translate(14,14)" stroke="#d0d4dc" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-7" y="-6.5" width="14" height="13" rx="2"/>
        <polyline points="-4,-2.5 -1.5,0 -4,2.5"/>
        <line x1="0" y1="3" x2="4" y2="3"/>
      </g>
    </g>
    <!-- Tile 2: Agent (Claude) -->
    <g transform="translate(32,0)">
      <rect width="28" height="28" rx="5" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="0.75"/>
      <!-- Sparkle/star icon for agent -->
      <g transform="translate(14,14)" fill="#9ca3af">
        <path d="M0-6.5 C0.8-2.2 2.2-0.8 6.5 0 2.2 0.8 0.8 2.2 0 6.5 -0.8 2.2-2.2 0.8-6.5 0-2.2-0.8-0.8-2.2 0-6.5Z" fill-opacity="0.7"/>
      </g>
      <!-- Activity pulse dot -->
      <circle cx="25" cy="3" r="2" fill="#8b5cf6" opacity="0.9"/>
    </g>
    <!-- Tile 3: Agent (Codex) -->
    <g transform="translate(64,0)">
      <rect width="28" height="28" rx="5" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="0.75"/>
      <!-- Sparkle icon -->
      <g transform="translate(14,14)" fill="#9ca3af">
        <path d="M0-6.5 C0.8-2.2 2.2-0.8 6.5 0 2.2 0.8 0.8 2.2 0 6.5 -0.8 2.2-2.2 0.8-6.5 0-2.2-0.8-0.8-2.2 0-6.5Z" fill-opacity="0.7"/>
      </g>
      <circle cx="25" cy="3" r="2" fill="#8b5cf6" opacity="0.9"/>
    </g>
    <!-- Tile 4: Terminal -->
    <g transform="translate(96,0)">
      <rect width="28" height="28" rx="5" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16" stroke-width="0.75"/>
      <g transform="translate(14,14)" stroke="#7a8290" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-7" y="-6.5" width="14" height="13" rx="2"/>
        <polyline points="-4,-2.5 -1.5,0 -4,2.5"/>
        <line x1="0" y1="3" x2="4" y2="3"/>
      </g>
    </g>
    <!-- Row 2 -->
    <!-- Tile 5: Browser (with globe icon) -->
    <g transform="translate(0,32)">
      <rect width="28" height="28" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.24" stroke-width="0.75"/>
      <!-- Globe icon -->
      <g transform="translate(14,14)" stroke="#8a93a5" stroke-width="1.2" fill="none">
        <circle cx="0" cy="0" r="6.5"/>
        <ellipse cx="0" cy="0" rx="3" ry="6.5"/>
        <line x1="-6.5" y1="0" x2="6.5" y2="0"/>
      </g>
    </g>
  </g>

  <!-- vector tab -->
  <text x="430" y="163" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="13" fill="#555d6d">vector</text>

  <!-- + button -->
  <text x="498" y="164" font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="16" fill="#444c58">+</text>

  <!-- Annotation labels -->
  <g font-family="-apple-system,'SF Pro Text','Segoe UI',system-ui,sans-serif" font-size="11" font-weight="500">
    <!-- Projects label -->
    <g transform="translate(600,150)">
      <rect x="-4" y="-13" width="72" height="19" rx="4" fill="#3b82f6" fill-opacity="0.12"/>
      <text fill="#60a5fa">Projects</text>
      <line x1="-8" y1="-3" x2="-80" y2="-3" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3,2"/>
    </g>
    <!-- Node minimap label -->
    <g transform="translate(600,178)">
      <rect x="-4" y="-13" width="108" height="19" rx="4" fill="#a855f7" fill-opacity="0.12"/>
      <text fill="#c084fc">Node minimap</text>
      <line x1="-8" y1="-3" x2="-185" y2="-18" stroke="#c084fc" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="3,2"/>
    </g>
  </g>
</svg>